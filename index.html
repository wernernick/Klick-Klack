<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Y2K System Login</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-screen" class="login-container">
        <div class="window-box">
            <div class="window-header">
                <span>🔒 System_Login.exe</span>
            </div>
            <div class="window-content">
                <p>Bitte Benutzer auswählen:</p>
                <div class="login-buttons">
                    <button id="login-klaudia" class="y2k-btn pink-btn">🌸 KLAUDIA</button>
                    <button id="login-nick" class="y2k-btn blue-btn">💻 NICK</button>
                </div>
            </div>
        </div>
    </div>

    <main id="main-dashboard" class="split-container hidden">
        
        <section id="klaudia-section" class="side klaudia-side">
            <div class="window-box">
                <div class="window-header">
                    <span>❤️ klaudia_space.exe</span>
                    <button class="window-btn" onclick="location.reload()">x</button> </div>
                <div class="window-content">
                    <div class="tamagotchi-display">
                        <img id="tama-img" src="https://via.placeholder.com/120?text=Pixel+Tama" alt="Tamagotchi">
                    </div>
                    <div class="pixel-bar-container">
                        <div id="energy-bar" class="pixel-bar pink-bar"></div>
                    </div>
                    <button id="pet-btn" class="y2k-btn pink-btn">STREICHELN</button>
                    
                    <hr class="pixel-hr">
                    
                    <h3>Tägliches Glücksrad</h3>
                    <div class="y2k-wheel-wrapper">
                        <div class="wheel-pointer">🔽</div>
                        <div id="wheel" class="y2k-wheel">
                            <div class="wheel-text" style="--i:0;">Massage</div>
                            <div class="wheel-text" style="--i:1;">Kino</div>
                            <div class="wheel-text" style="--i:2;">Kochen</div>
                            <div class="wheel-text" style="--i:3;">Joker</div>
                            <div class="wheel-text" style="--i:4;">Ausflug</div>
                            <div class="wheel-text" style="--i:5;">Niete</div>
                        </div>
                    </div>
                    <button id="spin-btn" class="y2k-btn pink-btn">DREHEN</button>
                    <p id="wheel-result" class="pixel-result-text">Klick auf Drehen!</p>
                </div>
            </div>
        </section>

        <section id="nick-section" class="side nick-side">
            <div class="window-box">
                <div class="window-header blue-header">
                    <span>⚙️ nick_terminal.exe</span>
                    <button class="window-btn" onclick="location.reload()">x</button> </div>
                <div class="window-content">
                    <h3>Miss-You Ping</h3>
                    <p>Sende ein Signal rüber!</p>
                    <button id="miss-you-btn" class="y2k-btn blue-btn">PING SENDEN</button>
                    
                    <hr class="pixel-hr">

                    <h3>Dev-Controls</h3>
                    <p class="small-text">Sicherheits-Sync (Nur Keyboard: Tab -> Enter)</p>
                    <button id="dev-sync-btn" class="y2k-btn blue-btn no-mouse-btn">DB_SYNC</button>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
